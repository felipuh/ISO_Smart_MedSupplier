name: IsoSmart Core Smoke

'on':
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/core-smoke.yml'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  backend-core-tests:
    name: Backend Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run core test suites (SQLite)
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: backend.settings_test
        run: |
          python manage.py test authentication.tests integration.tests core.tests -v 2
