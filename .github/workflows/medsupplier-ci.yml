name: MedSupplier CI

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docs/**'
      - '.github/workflows/medsupplier-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docs/**'
      - '.github/workflows/medsupplier-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: medsupplier-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Checks And Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Django check
        run: python backend/manage.py check --settings=backend.settings_test

      - name: Migration drift check
        run: python backend/manage.py makemigrations --check --dry-run --settings=backend.settings_test

      - name: Backend tests
        run: python backend/manage.py test core.tests.ProductionLikeProbeTests medsupplier --settings=backend.settings_test

      - name: Production-like deploy check
        env:
          ENVIRONMENT: production
          DEBUG: 'False'
          SECRET_KEY: ci-production-like-secret-key-7f9c1a42b8e64d5fa37c2e19d0ab8642
          ALLOWED_HOSTS: medsupplier.example.test
          CORS_ALLOWED_ORIGINS: https://medsupplier.example.test
          CSRF_TRUSTED_ORIGINS: https://medsupplier.example.test
          ADMIN_APPS_ALLOW_LOCAL_FALLBACK: 'False'
          SESSION_COOKIE_SECURE: 'True'
          CSRF_COOKIE_SECURE: 'True'
          SECURE_SSL_REDIRECT: 'True'
          SECURE_HSTS_SECONDS: '31536000'
          SECURE_HSTS_INCLUDE_SUBDOMAINS: 'True'
          SECURE_HSTS_PRELOAD: 'False'
        run: python backend/manage.py check --deploy --settings=backend.settings

  frontend:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    name: MedSupplier E2E
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run MedSupplier E2E
        working-directory: frontend
        env:
          DJANGO_SETTINGS_MODULE: backend.settings_test
          ENVIRONMENT: development
          VITE_LOCAL_AUTH_BYPASS: '1'
          SECURE_SSL_REDIRECT: 'False'
          SECURE_HSTS_SECONDS: '0'
          SESSION_COOKIE_SECURE: 'False'
          CSRF_COOKIE_SECURE: 'False'
        run: npm run test:e2e:medsupplier
