name: Assistant Tests

on:
  pull_request:
    paths:
      - 'backend/integration/**'
      - 'backend/authentication/**'
      - 'backend/core/**'
      - 'backend/backend/**'
      - 'frontend/src/components/Assistant/**'
      - 'frontend/src/services/assistantService.js'
      - 'frontend/tests/e2e/assistant-runtime.spec.js'
      - '.github/workflows/assistant-tests.yml'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  workflow_dispatch:

jobs:
  backend-assistant-tests:
    name: Backend Assistant API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run assistant backend tests (SQLite test settings)
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: backend.settings_test
        run: |
          python manage.py test integration.tests -v 2

  frontend-assistant-tests:
    name: Frontend Assistant UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run assistant e2e tests
        working-directory: frontend
        run: npm run test:e2e -- tests/e2e/assistant-runtime.spec.js --reporter=line
