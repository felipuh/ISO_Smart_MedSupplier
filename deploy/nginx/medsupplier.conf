upstream medsupplier_backend {
    server 127.0.0.1:8002;
}

server {
    listen 80;
    listen [::]:80;
    server_name medsupplier.isosmart.local medsupplier.smart3ai.local;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ {
        proxy_pass http://medsupplier_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://medsupplier_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/felipe/proyectos/ISO_Smart_MedSupplier/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/felipe/proyectos/ISO_Smart_MedSupplier/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /assets/ {
        root /home/felipe/proyectos/ISO_Smart_MedSupplier/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location / {
        root /home/felipe/proyectos/ISO_Smart_MedSupplier/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
