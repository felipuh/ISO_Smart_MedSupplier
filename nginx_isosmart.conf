# Nginx Configuration for IsoSmart
# This configuration serves the IsoSmart application on port 80
# and proxies API requests to the Django backend on port 8001

# ── Compresión gzip ───────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;


upstream isosmart_backend {
    server 127.0.0.1:8001;
}

upstream adminapps_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name isosmart.local localhost;
    
    client_max_body_size 50M;
        # ── Headers de seguridad ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self';" always;

    
    # Django API
    location /api/ {
        proxy_pass http://isosmart_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Admin interface
    location /admin/ {
        proxy_pass http://isosmart_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # Static files
    location /static/ {
        alias /home/felipe/proyectos/isosmart/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Media files
    location /media/ {
        alias /home/felipe/proyectos/isosmart/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Frontend (Static build)
    location / {
        root /home/felipe/proyectos/isosmart/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";

        # Assets con hash en el nombre → caché inmutable 1 año
        location /assets/ {
            root /home/felipe/proyectos/isosmart/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

    }

    # Landing fallback path for environments where landing subdomain DNS is unavailable
    location /landing/ {
        alias /home/felipe/proyectos/landing/;
        try_files $uri $uri/ /landing/index.html;
        add_header Cache-Control "no-store";
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

